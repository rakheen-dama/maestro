<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" data-theme="light">
<head th:replace="~{fragments/head :: head('Timer Monitor')}">
    <title>Timer Monitor — Maestro Admin</title>
</head>
<body>
    <nav th:replace="~{fragments/nav :: nav('timers')}"></nav>

    <main class="container">
        <div th:insert="~{fragments/flash :: messages}"></div>

        <hgroup>
            <h1>Timer Monitor</h1>
            <p>Timer events across all workflows (auto-refreshes every 5s)</p>
        </hgroup>

        <!-- Auto-refreshing table -->
        <div id="timer-results"
             hx-get="/admin/fragments/timers"
             hx-trigger="every 5s"
             hx-swap="innerHTML">

            <div th:insert="~{fragments/timer-table :: content}"></div>
        </div>
    </main>
</body>
</html>
