name: Bug Report
description: Report a bug in Maestro
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix it.

  - type: input
    id: version
    attributes:
      label: Maestro Version
      description: Which version of Maestro are you using?
      placeholder: e.g. 0.3.0
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which module is affected?
      options:
        - maestro-core
        - maestro-spring-boot-starter
        - maestro-store-postgres
        - maestro-store-jdbc
        - maestro-messaging-kafka
        - maestro-lock-valkey
        - maestro-admin
        - maestro-admin-client
        - maestro-test
        - Other / Not sure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include stack traces or log output if applicable.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Runtime environment details.
      value: |
        - Java version:
        - Spring Boot version:
        - Database: PostgreSQL
        - Kafka version:
        - Valkey/Redis version:
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or configuration that might help.
    validations:
      required: false
