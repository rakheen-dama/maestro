spring:
  application:
    name: sample-order-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:maestro}
    username: ${POSTGRES_USER:maestro}
    password: ${POSTGRES_PASSWORD:maestro}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer

  data:
    redis:
      url: redis://${VALKEY_HOST:localhost}:${VALKEY_PORT:6379}

server:
  port: ${SERVER_PORT:8081}

maestro:
  service-name: order-service

  store:
    type: postgres

  messaging:
    type: kafka
    topics:
      tasks: maestro.tasks.orders
      signals: maestro.signals.order-service

  lock:
    type: valkey

  worker:
    task-queues:
      - name: orders
        concurrency: 5

  admin:
    events:
      enabled: true
