services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: maestro
      POSTGRES_USER: maestro
      POSTGRES_PASSWORD: maestro
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  document-service:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        MODULE: maestro-samples/sample-postgres-only
    ports:
      - "8083:8083"
    environment:
      POSTGRES_HOST: postgres
      SERVER_PORT: 8083
    depends_on:
      - postgres

volumes:
  pgdata:
